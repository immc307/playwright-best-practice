name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install bagel-shop dependencies
        run: npm run install:bagel-shop

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Debug - Verify environment variables
        run: |
          echo "BASE_URL length: ${#BASE_URL}"
          echo "API_URL length: ${#API_URL}"
          if [ -z "$BASE_URL" ]; then echo "❌ BASE_URL is EMPTY — secret not found!"; else echo "✅ BASE_URL is set"; fi
          if [ -z "$API_URL" ]; then echo "❌ API_URL is EMPTY — secret not found!"; else echo "✅ API_URL is set"; fi
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          API_URL: ${{ secrets.API_URL }}

      - name: Run Playwright tests
        run: npx playwright test
        env:
          CI: true
          BASE_URL: ${{ secrets.BASE_URL }}
          API_URL: ${{ secrets.API_URL }}

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test results (traces, videos, screenshots)
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: test-results
          path: test-results/
          retention-days: 30
