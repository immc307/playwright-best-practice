name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install bagel-shop dependencies
        run: npm run install:bagel-shop

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # ── Start Toolshop app via Docker ──────────────────────────
      - name: Start Toolshop app (Docker)
        run: docker compose -f docker-compose.ci.yml up -d

      - name: Wait for database to be ready
        run: |
          echo "Waiting for MariaDB..."
          timeout 60 bash -c 'until docker compose -f docker-compose.ci.yml exec -T mariadb mysqladmin ping -h localhost -uroot -proot --silent; do sleep 2; done'
          echo "✅ MariaDB is ready"

      - name: Seed database
        run: |
          echo "Running migrations and seeding..."
          docker compose -f docker-compose.ci.yml exec -T laravel-api php artisan migrate:fresh --seed --force
          echo "✅ Database seeded"

      - name: Wait for Angular UI to be ready
        run: |
          echo "Waiting for Angular UI on port 4200..."
          timeout 180 bash -c 'until curl -s http://localhost:4200 > /dev/null 2>&1; do sleep 3; done'
          echo "✅ Angular UI is ready"

      - name: Wait for API to be ready
        run: |
          echo "Waiting for API on port 8091..."
          timeout 60 bash -c 'until curl -s http://localhost:8091 > /dev/null 2>&1; do sleep 2; done'
          echo "✅ API is ready"
      # ──────────────────────────────────────────────────────────

      - name: Run Playwright tests
        run: npx playwright test
        env:
          CI: true
          BASE_URL: http://localhost:4200
          API_URL: http://localhost:8091

      # ── Cleanup & Artifacts ───────────────────────────────────
      - name: Stop Toolshop containers
        if: always()
        run: docker compose -f docker-compose.ci.yml down

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test results (traces, videos, screenshots)
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: test-results
          path: test-results/
          retention-days: 30
