# Minimal Docker Compose for CI — self-hosts the Toolshop app
# Based on: https://github.com/testsmith-io/practice-software-testing
# Frontend: http://localhost:4200 | API: http://localhost:8091

services:
  mariadb:
    image: yobasystems/alpine-mariadb:10.6.11
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: user
      MYSQL_PASSWORD: root
      MYSQL_DATABASE: toolshop
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 30

  laravel-api:
    image: testsmith/practice-software-testing-sprint5-api
    environment:
      - PHP_OPCACHE_VALIDATE_TIMESTAMPS=1
      - DB_PORT=3306
      - DB_HOST=mariadb
      - host=localhost
      - DISABLE_LOGGING=true
    volumes:
      - laravel-app-code:/var/www
    depends_on:
      mariadb:
        condition: service_healthy

  web:
    image: testsmith/practice-software-testing-web
    ports:
      - "8091:80"
      - "8000:81"
    volumes:
      - laravel-app-code:/var/www
    depends_on:
      - laravel-api

  angular-ui:
    image: testsmith/practice-software-testing-sprint5-ui
    ports:
      - "4200:4200"
    command: >
      bash -c "ng serve --host 0.0.0.0 --port 4200"

volumes:
  laravel-app-code:
